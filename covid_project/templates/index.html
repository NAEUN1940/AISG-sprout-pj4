<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COVID-19 Tweet Tracker (ML Connected)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #000000;
            color: #e7e9ea;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            border-left: 1px solid #2f3336;
            border-right: 1px solid #2f3336;
            min-height: 100vh;
        }
        .header {
            font-size: 20px;
            font-weight: bold;
            padding: 15px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #2f3336;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .upload-btn {
            border: 1px solid #1d9bf0;
            color: white;
            background-color: #1d9bf0;
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            border-bottom: 1px solid #2f3336;
        }
        .filter-btn {
            padding: 8px 16px;
            border-radius: 9999px;
            border: 1px solid #536471;
            background-color: transparent;
            color: #eff3f4;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .filter-btn:hover { background-color: rgba(239, 243, 244, 0.1); }
        .filter-btn.active { background-color: #1d9bf0; border-color: #1d9bf0; color: white; }
        .feed { display: flex; flex-direction: column; }
        .tweet { padding: 15px; display: flex; gap: 12px; border-bottom: 1px solid #2f3336; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background-color: #333639; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #71767b; }
        .tweet-content { flex: 1; }
        .user-info { display: flex; gap: 5px; align-items: center; margin-bottom: 2px; }
        .name { font-weight: bold; color: #e7e9ea; }
        .handle { color: #71767b; font-size: 15px; }
        .text { line-height: 1.5; font-size: 15px; word-break: break-word; margin: 0; }
        .category-tags { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
        .tag { font-size: 12px; color: #1d9bf0; }
        .empty-message { padding: 30px; text-align: center; color: #71767b; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>COVID-19 ML Tracker</span>
        <div class="upload-btn-wrapper">
            <button class="upload-btn">TSV 파일 업로드</button>
            <input type="file" id="fileInput" accept=".tsv" />
        </div>
    </div>
    
    <div class="filter-container" id="filters">
        <button class="filter-btn" data-category="confirmed">확진 (Confirmed)</button>
        <button class="filter-btn" data-category="suspected">의심 (Suspected)</button>
        <button class="filter-btn" data-category="death">사망 (Death)</button>
        <button class="filter-btn" data-category="recovered">완치 (Recovered)</button>
        <button class="filter-btn" data-category="tested">검사 (Tested)</button>
    </div>

    <div class="feed" id="feed">
        <div class="empty-message">
            우측 상단의 <b>'TSV 파일 업로드'</b> 버튼을 눌러서<br>검증할 데이터(<b>valid.tsv</b> 또는 <b>test.tsv</b>)를 선택하세요.<br><br>
            <span style="font-size:13px; color:#536471;">*Flask 서버의 파이썬 AI 모델이 실시간으로 분류합니다.</span>
        </div>
    </div>
</div>

<script>
    let processedTweets = []; 
    let activeFilters = new Set();
    const feedContainer = document.getElementById("feed");
    const filterButtons = document.querySelectorAll(".filter-btn");

    // 파일 선택 시 Flask 서버로 전송
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        feedContainer.innerHTML = `<div class="empty-message">🤖 파이썬 머신러닝 모델이 데이터를 분석하고 있습니다...</div>`;

        const formData = new FormData();
        formData.append('file', file);

        // Flask 서버의 /predict API 호출
        fetch('/predict', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                feedContainer.innerHTML = `<div class="empty-message" style="color:red;">❌ 에러 발생: ${data.error}</div>`;
                return;
            }
            
            // 서버에서 예측 완료된 데이터 저장
            processedTweets = data.tweets.map((tweet, index) => ({
                user: "User_" + (index + 1),
                handle: "@user_" + tweet.id,
                text: tweet.text,
                categories: tweet.categories
            }));

            renderTweets();
        })
        .catch(error => {
            feedContainer.innerHTML = `<div class="empty-message" style="color:red;">❌ 서버 연결에 실패했습니다.</div>`;
            console.error(error);
        });
    });

    // 화면에 트윗 그리기 (중복 선택 필터링 포함)
    function renderTweets() {
        feedContainer.innerHTML = "";
        
        const filteredTweets = processedTweets.filter(tweet => {
            if (activeFilters.size === 0) return true;
            return tweet.categories.some(cat => activeFilters.has(cat));
        });

        if (filteredTweets.length === 0) {
            feedContainer.innerHTML = `<div class="empty-message">해당 카테고리에 일치하는 머신러닝 분류 결과가 없습니다.</div>`;
            return;
        }

        // 과부하 방지를 위해 상위 200개만 렌더링
        const displayLimit = Math.min(filteredTweets.length, 200);

        for(let i = 0; i < displayLimit; i++) {
            const tweet = filteredTweets[i];
            const tweetEl = document.createElement("div");
            tweetEl.className = "tweet";
            
            // 키워드가 없으면 일반 정보 멘트 표출, 있으면 태그 표출
            const tagsHtml = tweet.categories.length > 0 
                ? tweet.categories.map(cat => `<span class="tag">#${cat}</span>`).join(" ")
                : `<span class="tag" style="color:#71767b;">#other_informative</span>`;
            
            tweetEl.innerHTML = `
                <div class="avatar">${tweet.user.charAt(0)}</div>
                <div class="tweet-content">
                    <div class="user-info">
                        <span class="name">${tweet.user}</span>
                        <span class="handle">${tweet.handle}</span>
                    </div>
                    <p class="text">${tweet.text}</p>
                    <div class="category-tags">${tagsHtml}</div>
                </div>
            `;
            feedContainer.appendChild(tweetEl);
        }
    }

    // 버튼 클릭 이벤트 (다중 필터 지원)
    filterButtons.forEach(btn => {
        btn.addEventListener("click", (e) => {
            const category = e.target.getAttribute("data-category");
            if (activeFilters.has(category)) {
                activeFilters.delete(category);
                e.target.classList.remove("active");
            } else {
                activeFilters.add(category);
                e.target.classList.add("active");
            }
            renderTweets();
        });
    });
</script>
</body>
</html>
